<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Adicionar forma de pagamento</title>
  </head>
  <body class="bg-dark2">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="/client/home.html">SeuChico</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="/client/home.html">
                <i class="bi bi-house-fill"></i> Home
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link disabled" href="#">
                <i class="bi bi-box-seam-fill"></i> Produtos
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link disabled" href="#">
                <i class="bi bi-clipboard-fill"></i> Categorias
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/client/formapagamento.html">
                <i class="bi bi-credit-card-fill"></i> Forma de pagamento
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <h1 class="fs-2 text-center m-5" id="h1">Adicionar forma de pagamento</h1>

    <form
      onsubmit="savePaymentOption()"
      method="dialog"
      class="d-flex align-items-center flex-column"
    >
      <div>
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="name"
            required
            placeholder="Nome da forma de pagamento"
            autofocus
          />
          <label for="floatingInput">Nome</label>
        </div>
      </div>
      <div class="d-flex gap-4">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <button
          type="button"
          class="btn btn-secondary"
          onclick="window.location = '/client/formapagamento.html'"
        >
          Cancelar
        </button>
      </div>
    </form>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
    <script>
      loadPaymentOption();
      checkLoginStatus();
    </script>
  </body>
</html>
